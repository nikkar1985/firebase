<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Διαγραφή εγγραφού</title>
    <style>
        body { font-family: sans-serif; margin: 40px; line-height: 1.6; }
        .container { max-width: 500px; background: #fff4e6; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h3 { color: #d9480f; }
        button {
            background-color: #fd7e14; color: white; border: none;
            padding: 10px 15px; border-radius: 5px; cursor: pointer; font-size: 16px;
        }
        button:hover { background-color: #e8590c; }
        .status { margin-top: 10px; font-size: 0.9em; color: #555; }
    </style>
</head>
<body>

    <div class="container">
        <h3>Διαγραφή εγγραφού</h3>
        <p>Πατώντας το κουμπί, θα διαγραφεί ένα έγγραφο με το σταθερό ID <b>"1"</b> στη συλλογή <b>students</b>.</p>

        <button id="delBtn">Διαγραφή Χρήστη 1</button>
        <p id="status" class="status"></p>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getFirestore, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

      const firebaseConfig = {
          apiKey: "",
          authDomain: "",
          projectId: "",
          storageBucket: "",
          messagingSenderId: "",
          appId: ""
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      // Διόρθωση 1: Αλλάζουμε το όνομα σε delBtn για να μη μπερδεύεται με τη deleteDoc()
      const delBtn = document.getElementById("delBtn");
      const statusPara = document.getElementById("status");

      // Διόρθωση 2: Χρησιμοποιούμε το delBtn εδώ
      delBtn.addEventListener("click", async () => {
          try {
              statusPara.innerText = "Γίνεται διαγραφή...";

              // Δημιουργία αναφοράς στο έγγραφο
              const docRef = doc(db, "students", "1");

              // Κλήση της συνάρτησης του Firebase
              await deleteDoc(docRef);

              statusPara.innerText = "Επιτυχία! Το έγγραφο διαγράφτηκε.";
          } catch (error) {
              console.error("Σφάλμα:", error);
              statusPara.innerText = "Σφάλμα κατά τη διαγραφή: " + error.message;
          }
      });
  </script>
</body>
</html>
